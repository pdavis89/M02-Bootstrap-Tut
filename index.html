<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Bootstrap 5 Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
      <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
      rel="stylesheet">

  </head>
  <body>
    <div class="container-fluid text-bg-info">
      <h1 class="display-3">My First Bootstrap Page</h1>
      <p>Here is a fluid container with light blue background.</p>
    </div>
    <div class="container mt-3">
      <button type="button" class="btn btn-info">This is a button</button>
      <button type="button" class="btn btn-info">Another button</button>
      <button type="button" class="btn btn-info">And a third button</button>
    </div>
    <div class="container mt-3">
      <h2>Some of Our Favorite Boardgames</h2>
      <table class="table">
        <thead class="table-info">
          <tr>
            <th>Boardgame</th>
            <th>Genre</th>
            <th>Rating (0-5)</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Nemesis</td>
            <td>Survival/semi co-op</td>
            <td>4.7</td>
          </tr>
          <tr>
            <td>Everdell</td>
            <td>Plateau building/worker placement/resource management</td>
            <td>4.5</td>
          </tr>
          <tr>
            <td>Ticket to Ride: Rails and Sails</td>
            <td>Euro strategy</td>
            <td>4.0</td>
          </tr>
        </tbody>
      </table>
    </div> 
    <script 
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js">
    </script> 
  </body>
</html>
